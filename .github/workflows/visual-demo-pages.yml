name: visual-demo-pages

on:
  workflow_dispatch:
  push:
    branches:
      - project-dev4paper
    paths:
      - "benchmark/**"
      - "visual-demo/**"
      - "benchmark_web.py"
      - "scripts/build_visual_demo_site.py"
      - "requirements.txt"
      - ".github/workflows/visual-demo-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: visual-demo-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate benchmark snapshot
        run: |
          python benchmark_web.py --smoke-test
          python scripts/build_visual_demo_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: visual-demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
